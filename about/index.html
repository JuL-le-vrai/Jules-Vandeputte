      <p>Driven by a long-standing interest in the ocean and marine ecosystems, I progressively oriented my career toward environmental and marine sciences. This led me to spend five years on Réunion Island, where I first held a civil service position and subsequently completed a PhD in computer science applied to marine biology conducted between <em>Ifremer</em> (Réunion Island), <em>Inria</em> (Pl@ntNet team) and the <em>University of Montpellier</em>.</p>

      <p>I also enjoy freediving, both in pool training and competitions, although what I prefer most is depth freediving in the sea. More recently, I developed a taste for long-distance cycling trips in full autonomy, including journeys across Portugal, Spain, and Morocco.</p>
